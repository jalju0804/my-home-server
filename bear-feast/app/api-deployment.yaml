apiVersion: apps/v1
kind: Deployment
metadata:
  name: bear-feast-api
  namespace: shared
  labels:
    app: bear-feast-api
    app.kubernetes.io/name: bear-feast-api
    app.kubernetes.io/part-of: shared
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bear-feast-api
      app.kubernetes.io/name: bear-feast-api
  template:
    metadata:
      labels:
        app: bear-feast-api
        app.kubernetes.io/name: bear-feast-api
        app.kubernetes.io/part-of: shared
    spec:
      containers:
        - name: bear-feast-api
          image: ghcr.io/jalju0804/bear-feast-api:sha-0db3e6f07e7210122306c11de024bd8aa6e6bd9b
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          envFrom:
            - secretRef:
                name: bear-feast-api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: bear-feast-api
  namespace: shared
  labels:
    app: bear-feast-api
    app.kubernetes.io/name: bear-feast-api
    app.kubernetes.io/part-of: shared
spec:
  type: LoadBalancer
  selector:
    app: bear-feast-api
    app.kubernetes.io/name: bear-feast-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
