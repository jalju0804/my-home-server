apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: blog
  # Same namespace as Gateway so ingressgateway reliably receives this route (avoids cross-NS 404 NR).
  namespace: istio-ingress
spec:
  hosts:
    - "jalju.com"
    - "blog.jalju.com"
  gateways:
    - public-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            host: notion-blog.blog.svc.cluster.local
            port:
              number: 80
