apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: witt-bare-wildcard-cert
  # Same namespace as Gateway + ingressgateway workload (TLS secret for credentialName).
  namespace: istio-ingress
spec:
  dnsNames:
    - '*.jalju.com'
    - 'jalju.com'
  issuerRef:
    kind: ClusterIssuer
    name: le-wildcard-issuer
  secretName: wildcard-jalju-com-tls