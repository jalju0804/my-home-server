apiVersion: apps/v1
kind: Deployment
metadata:
  name: notion-blog
  namespace: blog
  labels:
    app: notion-blog
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: notion-blog
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # 무중단에 가깝게: 기존 Pod은 Ready 상태 유지(maxUnavailable=0)
      # 새 Pod을 추가로 띄움(maxSurge=1)
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 5
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app: notion-blog
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: notion-blog
          image: ghcr.io/jalju0804/my-blog:sha-fdcf89d
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: notion-blog-secret
            - configMapRef:
                name: notion-blog-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notion-blog
  namespace: blog
spec:
  selector:
    app: notion-blog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
