apiVersion: apps/v1
kind: Deployment
metadata:
  name: notion-blog
  namespace: blog
  labels:
    app: notion-blog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notion-blog
  template:
    metadata:
      labels:
        app: notion-blog
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: notion-blog
          image: ghcr.io/jalju0804/my-blog:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: notion-blog-secret
            - configMapRef:
                name: notion-blog-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: notion-blog
  namespace: blog
spec:
  selector:
    app: notion-blog
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
